        let products = [];

        function addNewRow() {
            products.push({name:'', barcode:'', brand_id:'446', category_id:'589', pos_cat_id:'101', uom_id:'1', price:0, cost:0});
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = products.map((p, i) => `
                <tr class="border-b">
                    <td class="border"><input type="text" value="${p.name}" onchange="update(${i}, 'name', this.value)"></td>
                    <td class="border"><input type="text" value="${p.barcode}" onchange="update(${i}, 'barcode', this.value)"></td>
                    <td class="border"><select onchange="update(${i}, 'brand_id', this.value)">${Object.entries(brands).map(([id, name]) => `<option value="${id}" ${p.brand_id==id?'selected':''}>${name}</option>`).join('')}</select></td>
                    <td class="border"><select onchange="update(${i}, 'category_id', this.value)">${Object.entries(categories).map(([id, name]) => `<option value="${id}" ${p.category_id==id?'selected':''}>${name}</option>`).join('')}</select></td>
                    <td class="border"><select onchange="update(${i}, 'pos_cat_id', this.value)">${Object.entries(posCats).map(([id, name]) => `<option value="${id}" ${p.pos_cat_id==id?'selected':''}>${name}</option>`).join('')}</select></td>
                    <td class="border"><select onchange="update(${i}, 'uom_id', this.value)">${Object.entries(uoms).map(([id, name]) => `<option value="${id}" ${p.uom_id==id?'selected':''}>${name}</option>`).join('')}</select></td>
                    <td class="border"><input type="number" value="${p.price}" onchange="update(${i}, 'price', this.value)"></td>
                    <td class="border"><input type="number" value="${p.cost}" onchange="update(${i}, 'cost', this.value)"></td>
                </tr>
            `).join('');
        }

        function update(i, field, val) { products[i][field] = val; }

        function downloadCSV() {
            const headers = ["Name","BarCode","Brand","Type","Product Category / Database id","Point of Sale Category / Database Id","internal reference","Unit of measure/Database ID","Purchase Uom/Database ID","Routes","Available in POS","Can be sold","Can be purchased","Price","Cost"];
            let csv = headers.join(",") + "\n";
            products.forEach(p => {
                csv += `"${p.name}","${p.barcode}","${p.brand_id}","Storable Product","${p.category_id}","${p.pos_cat_id}","","${p.uom_id}","${p.uom_id}","Buy","True","True","True","${p.price}","${p.cost}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "import_products.csv";
            link.click();
        }
